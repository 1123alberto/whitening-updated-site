<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
    <title>Κλείστε Ραντεβού Παλαιό Φάληρο | i-smile</title>
    <meta name="description"
        content="Κλείστε online ραντεβού για λεύκανση, όψεις ή νάρθηκες στο Παλαιό Φάληρο. Επιλέξτε υπηρεσία, ημερομηνία και ώρα.">
    <link rel="canonical" href="https://i-smile.gr/book.html">
    <link rel="alternate" hreflang="el" href="https://i-smile.gr/book.html?lang=el">
    <link rel="alternate" hreflang="en" href="https://i-smile.gr/book.html?lang=en">
    <link rel="alternate" hreflang="x-default" href="https://i-smile.gr/book.html">

    <!-- Social Metadata (Open Graph) -->
    <meta property="og:site_name" content="i-smile">
    <meta property="og:title" content="Κλείστε Ραντεβού Παλαιό Φάληρο | i-smile">
    <meta property="og:description" content="Κλείστε online ραντεβού για λεύκανση, όψεις ή νάρθηκες στο Παλαιό Φάληρο.">
    <meta property="og:image" content="https://i-smile.gr/assets/images/cta-bg.png">
    <meta property="og:url" content="https://i-smile.gr/book.html">
    <meta property="og:type" content="website">

    <!-- Twitter Card Metadata -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Κλείστε Ραντεβού Παλαιό Φάληρο | i-smile">
    <meta name="twitter:description" content="Online κρατήσεις για αισθητική οδοντιατρική στο Παλαιό Φάληρο.">
    <meta name="twitter:image" content="https://i-smile.gr/assets/images/cta-bg.png">

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Passions+Conflict&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cal-sans@1.0.1/dist/index.min.css">

    <link rel="stylesheet" href="style.css">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [{
        "@type": "ListItem",
        "position": 1,
        "name": "Αρχική",
        "item": "https://i-smile.gr/index.html"
      }, {
        "@type": "ListItem",
        "position": 2,
        "name": "Κλείστε Ραντεβού",
        "item": "https://i-smile.gr/book.html"
      }]
    }
    </script>
</head>

<body class="booking-page">
    <header class="header" id="header-root"></header>

    <main>
        <!-- Booking Hero -->
        <section class="booking-hero">
            <div class="container booking-hero-grid reveal">
                <div class="booking-hero-content">
                    <h1 class="hero-title" data-i18n="book_page_title">Κλείστε το Ραντεβού σας</h1>
                    <p class="hero-subtitle" data-i18n="book_page_desc">Επιλέξτε υπηρεσία, ημερομηνία και ώρα για τη
                        συνεδρία σας.</p>
                </div>
                <div class="booking-hero-widget">
                    <div class="booking-widget">
                        <!-- Global Loader -->
                        <div class="booking-loader" id="calendar-loader" style="display: none;">
                            <div class="spinner"></div>
                            <p data-i18n="loading_slots">Έλεγχος διαθεσιμότητας...</p>
                        </div>

                        <!-- Step 1: Calendar -->
                        <div id="booking-step-1" class="booking-step active">
                            <div class="calendar-header">
                                <button id="prev-week" class="calendar-nav-btn" aria-label="Previous Week">&larr;</button>
                                <h3 id="calendar-month" class="calendar-month">...</h3>
                                <button id="next-week" class="calendar-nav-btn" aria-label="Next Week">&rarr;</button>
                            </div>
                            <div class="calendar-grid" id="calendar-grid">
                                <!-- JS will populate -->
                            </div>
                        </div>

                        <!-- Step 2: Service Selection -->
                        <div id="booking-step-service" class="booking-step" style="display: none;">
                            <button class="back-btn" onclick="goToStep(1)">&larr; <span
                                    data-i18n="back_to_calendar">Πίσω στο Ημερολόγιο</span></button>
                            <h3 class="step-title" data-i18n="select_service">Επιλέξτε Υπηρεσία</h3>
                            <div class="service-grid">
                                <button class="service-btn" data-service="consult"
                                    onclick="selectService('consult', 30)">
                                    <div class="service-info">
                                        <h4 data-i18n="service_consult">Γενική Αισθητική Αξιολόγηση</h4>
                                        <p>30 <span data-i18n="mins">λεπτά</span></p>
                                    </div>
                                    <div class="service-price">30'</div>
                                </button>
                                <button class="service-btn" data-service="whitening"
                                    onclick="selectService('whitening', 90)">
                                    <div class="service-info">
                                        <h4 data-i18n="service_whitening">Λεύκανση Δοντιών</h4>
                                        <p>90 <span data-i18n="mins">λεπτά</span></p>
                                    </div>
                                    <div class="service-price">90'</div>
                                </button>
                                <button class="service-btn" data-service="veneers"
                                    onclick="selectService('veneers_consult', 60)">
                                    <div class="service-info">
                                        <h4 data-i18n="service_veneers_consult">Αξιολόγηση Όψεων</h4>
                                        <p>60 <span data-i18n="mins">λεπτά</span></p>
                                    </div>
                                    <div class="service-price">60'</div>
                                </button>
                                <button class="service-btn" data-service="aligners"
                                    onclick="selectService('aligners_consult', 60)">
                                    <div class="service-info">
                                        <h4 data-i18n="service_aligners_consult">Αξιολόγηση Νάρθηκα</h4>
                                        <p>60 <span data-i18n="mins">λεπτά</span></p>
                                    </div>
                                    <div class="service-price">60'</div>
                                </button>
                            </div>
                        </div>

                        <!-- Step 3: Time Slots -->
                        <div id="booking-step-2" class="booking-step" style="display: none;">
                            <button class="back-btn" onclick="goToStep('service')">&larr; <span
                                    data-i18n="back_to_services">Πίσω στις Υπηρεσίες</span></button>
                            <h3 class="step-title" id="selected-date-display">...</h3>
                            <div class="time-slots-grid" id="time-slots-grid">
                                <!-- JS will populate -->
                            </div>
                        </div>

                        <!-- Step 4: Details Form -->
                        <div id="booking-step-3" class="booking-step" style="display: none;">
                            <button class="back-btn" onclick="goToStep(2)">&larr; <span data-i18n="back_to_times">Πίσω
                                    στις Ώρες</span></button>
                            <h3 class="step-title" data-i18n="enter_details">Στοιχεία Επικοινωνίας</h3>
                            <p class="selected-slot-info text-large mb-4">
                                <strong id="final-date-time">...</strong>
                            </p>

                            <form id="booking-form" class="custom-form">
                                <div class="form-group">
                                    <label for="b-name" data-i18n="form_name">Ονοματεπώνυμο *</label>
                                    <input type="text" id="b-name" required placeholder="π.χ. Μαρία Παπαδοπούλου">
                                </div>
                                <div class="form-group">
                                    <label for="b-email" data-i18n="form_email">Email *</label>
                                    <input type="email" id="b-email" required placeholder="maria@example.com">
                                </div>
                                <div class="form-group">
                                    <label for="b-phone" data-i18n="form_phone">Κινητό Τηλέφωνο *</label>
                                    <input type="tel" id="b-phone" required placeholder="6930000000">
                                </div>

                                <button type="submit" class="btn btn-primary btn-large w-100" id="submit-booking-btn">
                                    <span data-i18n="confirm_booking">Επιβεβαίωση Ραντεβού</span>
                                </button>
                                <div class="booking-loader mt-4" id="submit-loader" style="display: none;">
                                    <div class="spinner"></div>
                                    <p data-i18n="saving_booking">Καταχώρηση...</p>
                                </div>
                            </form>
                        </div>

                        <!-- Step 5: Success -->
                        <div id="booking-step-4" class="booking-step text-center" style="display: none;">
                            <div class="success-icon">✓</div>
                            <h3 class="step-title" data-i18n="booking_success">Το ραντεβού σας επιβεβαιώθηκε!</h3>
                            <p class="text-large" data-i18n="booking_success_desc">Θα λάβετε σύντομα ένα email
                                επιβεβαίωσης. Σας περιμένουμε!</p>
                            <button class="btn btn-secondary mt-4" onclick="location.reload()"
                                data-i18n="book_another">Νέο Ραντεβού</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="contact">
        <footer class="footer" id="footer-root"></footer>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/booking.js"></script>
</body>

</html>
